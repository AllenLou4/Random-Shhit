<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./styles.css">
</head> 
<body>
    <div class="container">
        <div>
            <h1 class="header_text">Message!!!</h1>
            <h1 class="header_text">Another message?</h1>
        </div>
        <div class="gif_container">
            <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExeHdrbDg5N3I4M2Z1ODBsbmY5Ym94OGtoNHRzZmQzNmY0dnU1NWF5ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/BGW14OrL4jDozdWRat/giphy.gif" alt="Cute animated illustration">
        </div>
        <div class="buttons">
            <button class="btn" id="yesButton" onclick="nextPage()">BIG YES</button>
            <button class="btn" id="noButton" onmouseover="moveButton()" onmousedown="moveButton()">No</button>
        </div>
    </div>

    <script>
        function nextPage() {
            window.location.href = "yes.html";
        }

        function moveButton() {
            let button = document.getElementById('noButton');
            let buttonRect = button.getBoundingClientRect();
            let containerRect = document.body.getBoundingClientRect();

            let maxX = containerRect.width - buttonRect.width - 20;
            let maxY = containerRect.height - buttonRect.height - 20;

            let newX = Math.random() * maxX;
            let newY = Math.random() * maxY;

            button.style.position = "absolute";
            button.style.left = `${newX}px`;
            button.style.top = `${newY}px`;
        }
    </script>
</body> 
</html>
