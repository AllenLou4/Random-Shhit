<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./styles.css">
</head> 
<body>
    <div class="container">
        <div>
            <h1 class="header_text">Message!!!</h1>
            <h1 class="header_text">Another message?</h1>
        </div>
        <div class="gif_container">
            <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExeHdrbDg5N3I4M2Z1ODBsbmY5Ym94OGtoNHRzZmQzNmY0dnU1NWF5ZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/BGW14OrL4jDozdWRat/giphy.gif" alt="Cute animated illustration">
        </div>
        <div class="buttons">
            <button class="btn" id="yesButton" onclick="nextPage()">BIG YES</button>
            <button class="btn" id="noButton" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <script>
        function nextPage() {
            window.location.href = "yes.html";
        }

        function moveButton() {
            let button = document.getElementById('noButton');
            let maxX = window.innerWidth - button.offsetWidth - 20;
            let maxY = window.innerHeight - button.offsetHeight - 20;

            let x = Math.max(10, Math.random() * maxX);
            let y = Math.max(10, Math.random() * maxY);

            button.style.transform = `translate(${x}px, ${y}px)`;
        }
    </script>
</body> 
</html>
